workflows:
  expo-apk:
    name: Expo APK Build
    environment:
      node: latest
      groups:
        - expo

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Build APK
        script: eas build -p android --profile preview --non-interactive

    artifacts:
      - "**/*.apk"
