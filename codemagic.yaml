workflows:

  expo-android:

    name: Expo Android Build

    environment:

      node: latest

      groups:

        - expo

    scripts:

      - name: Install dependencies

        script: |

          npm install

      - name: Install Expo and EAS

        script: |

          npm install -g expo-cli eas-cli

      - name: Verify Expo login

        script: |

          eas whoami

      - name: Generate native project

        script: |

          npx expo prebuild --clean

      - name: Initialize EAS

        script: |

          eas init --non-interactive

      - name: Build Android

        script: |

          eas build -p android --non-interactive

    artifacts:

      - "*.apk"

      - "*.aab"
